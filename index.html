<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aniversarios · Mis Sesgos</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --negro:     #0a0a0a;
      --carbón:    #111111;
      --grafito:   #1c1c1c;
      --plomo:     #2e2e2e;
      --plata:     #8a8a8a;
      --niebla:    #c4c4c4;
      --crema:     #f0ead8;
      --oro:       #c9a84c;
      --oro-suave: #e8c97a;
      --rojo:      #a02020;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--negro);
      color: var(--crema);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── CABECERA ── */
    header {
      position: relative;
      text-align: center;
      padding: 4rem 1.5rem 3rem;
      border-bottom: 1px solid var(--plomo);
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(255,255,255,0.012) 3px,
        rgba(255,255,255,0.012) 4px
      );
      pointer-events: none;
    }
    .header-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--oro);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 8vw, 6rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--crema);
    }
    h1 em {
      font-style: italic;
      color: var(--oro);
    }
    .header-sub {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--plata);
      letter-spacing: 0.15em;
      margin-top: 1.2rem;
    }

    /* ── HOY ── */
    #hoy-banner {
      background: var(--grafito);
      border-bottom: 1px solid var(--plomo);
      padding: 1rem 1.5rem;
      text-align: center;
    }
    #hoy-banner .hoy-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--oro);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 0.4rem;
    }
    #hoy-lista {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--crema);
      font-style: italic;
    }

    /* ── CONTROLES ── */
    #controles {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--plomo);
      background: var(--carbón);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    #buscar {
      flex: 1;
      min-width: 180px;
      background: var(--grafito);
      border: 1px solid var(--plomo);
      color: var(--crema);
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      padding: 0.5rem 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #buscar:focus { border-color: var(--oro); }
    #buscar::placeholder { color: var(--plata); }

    .filtro-mes {
      background: var(--grafito);
      border: 1px solid var(--plomo);
      color: var(--niebla);
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      padding: 0.5rem 0.85rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .filtro-mes:hover, .filtro-mes:focus { border-color: var(--oro); color: var(--crema); }

    #ir-hoy {
      background: var(--rojo);
      border: none;
      color: var(--crema);
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      padding: 0.5rem 1rem;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s;
    }
    #ir-hoy:hover { background: #c02828; }

    /* ── GRID PRINCIPAL ── */
    #contenido {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    .mes-seccion {
      margin-bottom: 3rem;
    }
    .mes-titulo {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--oro);
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--plomo);
      padding-bottom: 0.5rem;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }
    .mes-titulo span {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--plata);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .tarjetas {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.75rem;
    }

    .tarjeta {
      background: var(--grafito);
      border: 1px solid var(--plomo);
      padding: 1rem 1.1rem;
      cursor: default;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .tarjeta:hover {
      border-color: var(--oro);
      background: var(--plomo);
    }
    .tarjeta.hoy-card {
      border-color: var(--oro);
      background: #1e1a10;
    }
    .tarjeta.hoy-card::before {
      content: '●';
      position: absolute;
      top: 0.6rem;
      right: 0.75rem;
      color: var(--oro);
      font-size: 0.45rem;
    }
    .tarjeta-fecha {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--oro-suave);
      letter-spacing: 0.1em;
      margin-bottom: 0.35rem;
    }
    .tarjeta-nombre {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      color: var(--crema);
      line-height: 1.3;
    }
    .tarjeta-tipo {
      font-family: 'Space Mono', monospace;
      font-size: 0.55rem;
      color: var(--plata);
      letter-spacing: 0.08em;
      margin-top: 0.4rem;
      text-transform: uppercase;
    }

    /* sin resultados */
    #sin-resultados {
      display: none;
      text-align: center;
      padding: 4rem 1rem;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--plata);
      font-size: 1.1rem;
    }

    /* ── PIE ── */
    footer {
      border-top: 1px solid var(--plomo);
      text-align: center;
      padding: 1.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--plata);
      letter-spacing: 0.1em;
    }

    @media (max-width: 600px) {
      .tarjetas { grid-template-columns: 1fr 1fr; }
      #controles { flex-direction: column; }
      #buscar, .filtro-mes, #ir-hoy { width: 100%; }
    }
  </style>
</head>

  const contenido = document.getElementById('contenido');
  const sinRes    = document.getElementById('sin-resultados');
  contenido.innerHTML = '';

  const busq = textoBuscar.toLowerCase().trim();
  const mesesAMostrar = filtroMes ? [parseInt(filtroMes)] : [...Array(12).keys()].map(i => i+1);
  let total = 0;

  mesesAMostrar.forEach(m => {
    let entradas = datos.filter(d => d.mes === m);
    if (busq) entradas = entradas.filter(d => d.nombre.toLowerCase().includes(busq) || d.tipo.toLowerCase().includes(busq));
    if (!entradas.length) return;

    total += entradas.length;
    const sec = document.createElement('section');
    sec.className = 'mes-seccion';
    sec.id = `mes-${m}`;

    sec.innerHTML = `<h2 class="mes-titulo">${MESES[m-1]} <span>${entradas.length} entrada${entradas.length!==1?'s':''}</span></h2>`;

    const grid = document.createElement('div');
    grid.className = 'tarjetas';

    entradas.forEach(d => {
      const esHoy = d.mes === mesHoy && d.dia === diaHoy;
      const t = document.createElement('div');
      t.className = 'tarjeta' + (esHoy ? ' hoy-card' : '');
      t.innerHTML = `
        <div class="tarjeta-fecha">${d.dia} de ${MESES[d.mes-1]}</div>
        <div class="tarjeta-nombre">${d.nombre}</div>
        <div class="tarjeta-tipo">${d.tipo}</div>
      `;
      grid.appendChild(t);
    });

    sec.appendChild(grid);
    contenido.appendChild(sec);
  });

  sinRes.style.display = total === 0 ? 'block' : 'none';
}

function bannerHoy() {
  const hoyEntradas = datos.filter(d => d.mes === mesHoy && d.dia === diaHoy);
  const el = document.getElementById('hoy-lista');
  if (!hoyEntradas.length) {
    el.textContent = 'Ningún aniversario registrado para hoy.';
  } else {
    el.textContent = hoyEntradas.map(d => d.nombre).join('  ·  ');
  }
}

// Eventos
document.getElementById('buscar').addEventListener('input', e => {
  render(document.getElementById('filtro-mes').value, e.target.value);
});
document.getElementById('filtro-mes').addEventListener('change', e => {
  render(e.target.value, document.getElementById('buscar').value);
});
document.getElementById('ir-hoy').addEventListener('click', () => {
  document.getElementById('filtro-mes').value = '';
  document.getElementById('buscar').value = '';
  render('', '');
  const sec = document.getElementById(`mes-${mesHoy}`);
  if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
});

// Init
bannerHoy();
render('', '');
</script>
